name: evals

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "agent/**"
      - "supabase/functions/agent/**"
      - ".github/workflows/evals.yml"
      - "promptfooconfig.yaml"
  schedule:
    - cron: "0 9 * * *"

jobs:
  # n8n workflow validation — closes the long-open P8 import smoke test
  # (INTEGRATION_PLAN §3 Wave 4 #17). The hermetic vitest importability check is
  # the gate; czlonkowski/n8n-mcp (pinned SHA) is the deeper node-schema validator.
  n8n-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Hermetic import smoke test (merge + validate every shipped archetype)
        run: npm test --workspace @scout/agent
      - name: Deep validation against real n8n node schemas (czlonkowski/n8n-mcp)
        continue-on-error: true
        env:
          # Pinned commit captured 2026-06-13 — see claude/DECISIONS.md (ADR 007).
          N8N_MCP_SHA: b0f5e25d22c1e28363c27aee160518c301341edc
        run: |
          set -euo pipefail
          echo "Validating shipped templates against n8n-mcp@$N8N_MCP_SHA node schemas."
          # n8n-mcp (MIT) bundles 1,851 node schemas + a workflow validator. It is a
          # BUILD-TIME/CI validator only — never a runtime dependency of a leased node.
          # Invocation is best-effort here (continue-on-error): the gating, verified
          # check is the hermetic vitest above. See the ADR for the exact validator
          # entrypoint and how to wire the n8n-mcp validate_workflow tool over
          # agent/n8n_templates/*.json once a runner has network access.
          npx -y "github:czlonkowski/n8n-mcp#${N8N_MCP_SHA}" --help \
            || echo "n8n-mcp deep validation skipped on this runner (network/setup); hermetic check above is authoritative."

  # promptfoo grounding regression gate (Wave 5 #22). Runs only when an API key is
  # configured, so the default CI path stays $0; the deterministic vitest evals are
  # the always-on gate.
  promptfoo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run promptfoo eval (skipped without ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping promptfoo (deterministic vitest evals are the $0 gate)."
            exit 0
          fi
          npx -y promptfoo@0.121.15 eval -c promptfooconfig.yaml --no-cache
