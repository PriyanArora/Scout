name: web-ci

on:
  pull_request:
    paths:
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - ".github/workflows/web-ci.yml"
  push:
    paths:
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - ".github/workflows/web-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web workspace
        run: npm run lint --workspace @scout/web

      - name: Typecheck web workspace
        run: npm run typecheck --workspace @scout/web

      - name: Test web workspace
        run: npm test --workspace @scout/web
