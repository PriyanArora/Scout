name: agent-ci

on:
  pull_request:
    paths:
      - "agent/**"
      - "mcp/**"
      - "supabase/functions/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - ".github/workflows/agent-ci.yml"
  push:
    paths:
      - "agent/**"
      - "mcp/**"
      - "supabase/functions/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - ".github/workflows/agent-ci.yml"

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

  checks:
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint agent workspace
        run: npm run lint --workspace @scout/agent

      - name: Typecheck agent workspace
        run: npm run typecheck --workspace @scout/agent

      - name: Test agent workspace
        run: npm test --workspace @scout/agent

      - name: Lint MCP workspace
        run: npm run lint --workspace @scout/mcp

      - name: Typecheck MCP workspace
        run: npm run typecheck --workspace @scout/mcp

      - name: Test MCP workspace
        run: npm test --workspace @scout/mcp
