# Scout reference-architecture patterns — hand-curated, grounded in:
#   - Enterprise Integration Patterns (Hohpe & Woolf; names free, Camel docs Apache-2.0)
#   - Workflow Patterns (van der Aalst et al., 2003) for the `control_flow` layer
#   - microservices.io (Richardson) — NAMES ONLY for integration_pattern (text is © all-rights-reserved)
#
# Each entry maps an opportunity type to a named pattern, a control-flow skeleton
# (which maps 1:1 onto n8n graph primitives), an n8n archetype, and the catalog
# tools likely to deliver it. `catalog_tools` reference ONLY canonical catalog ids
# (agent/catalog.yaml / agent/src/catalog/data.ts) — enforced by patterns.test.ts.
#
# control_flow vocabulary (Workflow Patterns -> n8n):
#   sequence          -> linear chain
#   exclusive-choice  -> IF / Switch (single branch taken)
#   parallel-split    -> multiple outgoing connections (fan-out)
#   synchronization   -> Merge node (join parallel branches)
#   simple-merge      -> Merge node (join alternative branches)
#
# pillars use the canonical short spelling (e.g. "Cybersecurity & Risk").
#
# This file is the human-readable spec; agent/src/patterns/data.ts is the in-code
# mirror consumed by the agent. A drift test keeps the two in lockstep.

- id: intake-triage
  name: Intake & Triage                       # EIP: Content-Based Router + Message Filter
  opportunity_types: [lead routing, lead capture, support triage, form intake, ticket routing]
  pillars: [Customer Experience & Marketing, Operations & Efficiency]
  control_flow: exclusive-choice
  data_flow: trigger -> classify -> route -> notify
  n8n_archetype: form-to-crm
  integration_pattern: ""
  catalog_tools: [power-automate, dynamics-365, hubspot, salesforce, microsoft-teams, slack, n8n]

- id: inbound-message-triage
  name: Inbound Message Triage                # EIP: Message Filter + Content-Based Router
  opportunity_types: [email triage, inbox automation, support classification, complaint routing]
  pillars: [Customer Experience & Marketing, Operations & Efficiency]
  control_flow: exclusive-choice
  data_flow: trigger -> extract -> classify -> route -> respond
  n8n_archetype: inbound-email-triage
  integration_pattern: ""
  catalog_tools: [intercom, zendesk, microsoft-teams, slack, claude-api, n8n]

- id: knowledge-assistant
  name: Knowledge Assistant (RAG)             # EIP: Content Enricher + Message Translator
  opportunity_types: [faq automation, internal knowledge search, document q&a, self-service]
  pillars: [Customer Experience & Marketing, Data & Decision Intelligence]
  control_flow: sequence
  data_flow: query -> retrieve -> ground -> answer -> cite
  n8n_archetype: rag-faq-skeleton
  integration_pattern: ""
  catalog_tools: [sharepoint, pgvector, pinecone, supabase, claude-api, copilot-studio, n8n]

- id: system-data-sync
  name: System Data Sync                      # EIP: Messaging Bridge + Message Translator
