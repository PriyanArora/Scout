  control_flow: sequence
  data_flow: trigger -> fetch -> transform -> upsert
  n8n_archetype: webhook-enrich-store
  integration_pattern: Transactional Outbox      # microservices.io NAME only
  catalog_tools: [power-automate, dynamics-365, hubspot, salesforce, postgres, supabase, n8n]

